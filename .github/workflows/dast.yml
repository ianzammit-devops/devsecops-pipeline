name: DAST - ZAP Scan

on:
  workflow_call:

jobs:
  dast:
    name: Run ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Clean stale Terraform state
        working-directory: terraform
        run: |
          terraform state rm aws_ecs_task_definition.app 2>/dev/null || true
          terraform state rm aws_ecs_service.app 2>/dev/null || true
          terraform state rm aws_iam_service_linked_role.ecs 2>/dev/null || true

      - name: Terraform Apply (spin up ephemeral container)
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_image_tag: ${{ github.sha }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devsecops-pipeline
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Get App URL
        id: get-url
        run: |
          CLUSTER="devsecops-pipeline-cluster"
          SERVICE="devsecops-pipeline-service"

          echo "Waiting for task to start..."
          sleep 30

          TASK_ARN=$(aws ecs list-tasks \
            --cluster $CLUSTER \
            --service-name $SERVICE \
            --query 'taskArns[0]' \
            --output text)

          echo "Task ARN: $TASK_ARN"

          ENI_ID=$(aws ecs describe-tasks \
            --cluster $CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          echo "ENI ID: $ENI_ID"

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "APP_URL=http://$PUBLIC_IP" >> $GITHUB_ENV
          echo "App URL: http://$PUBLIC_IP"

      - name: Run ZAP Baseline Scan (Pull Request)
        if: github.event_name == 'pull_request'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.APP_URL }}
          fail_action: true
          rules_file_name: zap/zap-rules.tsv
          artifact_name: zap-scan-results

      - name: Run ZAP Full Scan (Push to Main)
        if: github.event_name == 'push'
        uses: zaproxy/action-full-scan@v0.11.0
        with:
          target: ${{ env.APP_URL }}
          fail_action: true
          rules_file_name: zap/zap-rules.tsv
          artifact_name: zap-scan-results

      - name: Terraform Destroy (tear down ephemeral container)
        if: always()
        working-directory: terraform
        run: |
          aws ecs update-service \
            --cluster devsecops-pipeline-cluster \
            --service devsecops-pipeline-service \
            --desired-count 0 2>/dev/null || true

          aws ecs delete-service \
            --cluster devsecops-pipeline-cluster \
            --service devsecops-pipeline-service \
            --force 2>/dev/null || true

          sleep 30

          terraform state rm aws_ecs_task_definition.app 2>/dev/null || true
          terraform state rm aws_ecs_service.app 2>/dev/null || true
          terraform state rm aws_iam_service_linked_role.ecs 2>/dev/null || true
          terraform init
          terraform destroy -auto-approve
        env:
          TF_VAR_image_tag: ${{ github.sha }}